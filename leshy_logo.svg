<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Leshy logo">
  <!-- Светлый фон -->
  <rect width="512" height="512" rx="96" fill="#F4F1E8"/>

  <!-- ============ ГРИБНАЯ ШЛЯПА (позади головы) — как в референсе, слегка сглажена ============ -->
  <!-- Тонкая шляпа-полумесяц, огибающая макушку: слева низко у щеки,
       плоской дугой над волосами, справа спускается за головой хвостом -->
  <path d="M110 168
           C 118 118, 168 82, 246 74
           C 316 68, 372 90, 400 130
           C 420 158, 424 196, 414 226
           C 408 210, 398 196, 384 188
           C 388 166, 372 140, 340 124
           C 300 104, 236 104, 196 118
           C 162 130, 138 150, 130 176
           C 122 176, 114 172, 110 168 Z"
        fill="#B5754A" stroke="#1E3D2F" stroke-width="9"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ============ ГОЛОВА ЛЕШЕГО (поверх шляпы) ============ -->
  <g fill="none" stroke="#1E3D2F" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- Контур головы (квадратная, слегка неровная) -->
    <path d="M150 175
             L142 360
             Q142 372 156 372
             L360 372
             Q374 372 374 356
             L368 175"/>
    <!-- Взъерошенные волосы-зубцы сверху -->
    <path d="M150 178
             l10 -46 l8 40 l14 -54 l10 48 l16 -44 l12 42
             l18 -40 l12 40 l20 -34 l14 36 l22 -30 l14 32
             l18 -18"/>
    <!-- Левый глаз -->
    <circle cx="212" cy="250" r="26"/>
    <circle cx="212" cy="250" r="9" fill="#1E3D2F"/>
    <!-- Правый глаз (крупнее, с двойным контуром) -->
    <ellipse cx="300" cy="232" rx="40" ry="34"/>
    <ellipse cx="304" cy="234" rx="18" ry="20" fill="#1E3D2F" stroke="none"/>
    <!-- Кривая ухмылка -->
    <path d="M196 300
             Q250 356 336 300"/>
    <!-- Пара зубов -->
    <path d="M270 320 l0 22"/>
    <path d="M288 322 l0 22"/>
  </g>
</svg>
